<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎂</title>

  <style>
    body {
      background: linear-gradient(to right, #ffdede, #ffe9ca);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      color: #fff;
      padding: 40px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 50px;
    }

    p {
      font-size: 22px;
    }

    img {
      width: 250px;
      border-radius: 20px;
      margin: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    /* Floating hearts & cakes */
    .heart {
      position: fixed;
      bottom: 0;
      font-size: 24px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>🎂 Happy Birthday Shourya ❤️</h1>

  <p>You make the world brighter just by being in it ✨</p>

  <img src=""img1.jpg">
  <img src=""img2.jpg">
  <img src=""img3.jpg">

  <p>May all your dreams come true 💕</p>
  <p>— with all my love ❤️</p>

  <script>
    function createEmoji(emoji) {
      const el = document.createElement("div");
      el.className = "heart";
      el.innerText = emoji;
      el.style.left = Math.random() * 100 + "vw";
      el.style.animationDuration = (Math.random() * 3 + 4) + "s";
      document.body.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 7000);
    }

    // hearts 💖
    setInterval(() => createEmoji("💖"), 700);

    // cakes 🎂
    setInterval(() => createEmoji("🎂"), 2000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>
  <style>
    body {
      background: linear-gradient(to bottom, #ffe6f0, #fff);
      text-align: center;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    h1 {
      color: #ff4081;
      font-size: 40px;
      margin-top: 30px;
    }

    p {
      font-size: 18px;
      color: #444;
    }

    img {
      width: 250px;
      margin: 15px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* floating hearts */
    .heart {
      position: fixed;
      bottom: -20px;
      font-size: 24px;
      animation: float 6s infinite;
      color: red;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-800px); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>Happy Birthday Shouryaa 🎂❤️</h1>

<p style="font-size:20px; color:#444; margin-top:20px;">
Wishing you all the success and happiness
✨<br>
I love youu 🤍<br><br>

Happy 21, kiddoo 🎂🥳
</p>

<!-- IMAGES -->
<img src="pics/pic1.jpg.jpeg">
<img src="pics/pic2.jpg.jpeg">
<img src="pics/pic3.jpg.jpeg">

<!-- CAKE -->
<p style="font-size:50px;">🎂</p>

<!-- HEARTS -->
<div class="heart" style="left:10%;">❤️</div>
<div class="heart" style="left:30%; animation-delay:1s;">💖</div>
<div class="heart" style="left:50%; animation-delay:2s;">❤️</div>
<div class="heart" style="left:70%; animation-delay:3s;">💗</div>
<div class="heart" style="left:90%; animation-delay:4s;">❤️</div>

</body>
</html>
